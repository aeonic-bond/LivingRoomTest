<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furniture Configurator</title>
<link rel="stylesheet" href="../globalTokens.css">
<link rel="stylesheet" href="../globalTypography.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  /* ── Viewport (root layout) ─────────────────────────────── */
  .viewport {
    display: flex;
    width: 100%;
    height: 100%;
    background: var(--color-white-base);
  }

  /* ── DynamicLeftPanel ───────────────────────────────────── */
  .dynamic-left-panel {
    width: 184px;
    flex-shrink: 0;
    background: linear-gradient(97.5deg, #fbfafa, #d3d3d3);
  }

  /* ── Panel Drag Handle ──────────────────────────────────── */
  .panel-handle {
    width: 6px;
    flex-shrink: 0;
    cursor: col-resize;
    background: transparent;
    position: relative;
  }
  .panel-handle::after {
    content: '';
    position: absolute;
    top: 0;
    bottom: 0;
    left: 2px;
    width: 1px;
    background: var(--color-divider-gray-base);
  }
  .panel-handle:hover::after,
  .panel-handle:active::after {
    background: var(--color-text-black-off);
  }

  /* ── SceneContainer ─────────────────────────────────────── */
  .scene-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: linear-gradient(126deg, #fbfafa, #d3d3d3);
  }

  .scene-container canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── Room Label (HTML overlay) ──────────────────────────── */
  .room-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding-bottom: var(--spacer-700);
    font: var(--type-label-300);
    color: var(--color-black-base);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="viewport">
  <div class="dynamic-left-panel" id="dynamicLeftPanel"></div>
  <div class="panel-handle" id="panelHandle"></div>
  <div class="scene-container" id="sceneContainer">
    <canvas id="canvas"></canvas>
    <div class="room-label" id="roomLabel">Rectangle Room: 12ft x 16ft</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="CameraController.js"></script>
<script src="PanelController.js"></script>
<script src="SceneController.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const ROOM = {
  panelCols: 3,
  panelRows: 4,
  unitsPerPanel: 4,
  get width()  { return this.panelCols * this.unitsPerPanel; },
  get height() { return this.panelRows * this.unitsPerPanel; },
};

// ══════════════════════════════════════════════════════════════
//  THREE.JS SETUP
// ══════════════════════════════════════════════════════════════
const canvas    = document.getElementById('canvas');
const container = document.getElementById('sceneContainer');

const scene = new THREE.Scene();
scene.background = null;

const frustumSize = Math.max(ROOM.width, ROOM.height) + 6;
const aspect = container.clientWidth / container.clientHeight;

const camera = new THREE.OrthographicCamera(
  -frustumSize * aspect / 2,  frustumSize * aspect / 2,
   frustumSize / 2,           -frustumSize / 2,
   0.1, 100
);
camera.position.y = 20;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ══════════════════════════════════════════════════════════════
//  CONTROLLERS
// ══════════════════════════════════════════════════════════════
const cam = new CameraController(camera, container, {
  zoom: 1.1,
  x: ROOM.width / 2,
  z: ROOM.height / 2,
});
cam.toDefault();

const sceneCtrl = new SceneController(scene, ROOM, { showGrid: true });

const panels = new PanelController({
  panel:   document.getElementById('dynamicLeftPanel'),
  handle:  document.getElementById('panelHandle'),
  onChange: () => resize(),
});

// ══════════════════════════════════════════════════════════════
//  RENDER + RESIZE
// ══════════════════════════════════════════════════════════════
function resize() {
  cam.resize(frustumSize);
  renderer.setSize(container.clientWidth, container.clientHeight);
}

window.addEventListener('resize', resize);

(function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
