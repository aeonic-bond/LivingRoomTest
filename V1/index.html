<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Furniture Configurator</title>
<link rel="stylesheet" href="../globalTokens.css">
<link rel="stylesheet" href="../globalTypography.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="PanelController.css">
<link rel="stylesheet" href="PlacingMenu.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  /* ── Viewport (root layout) ─────────────────────────────── */
  .viewport {
    display: flex;
    width: 100%;
    height: 100%;
    background: var(--color-white-base);
  }

  /* ── DynamicLeftPanel ───────────────────────────────────── */
  .dynamic-left-panel {
    width: 184px;
    flex-shrink: 0;
    background: linear-gradient(97.5deg, #fbfafa, #d3d3d3);
  }

  /* ── SceneContainer ─────────────────────────────────────── */
  .scene-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: linear-gradient(126deg, #fbfafa, #d3d3d3);
  }

  .scene-container canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* ── Room Label (HTML overlay) ──────────────────────────── */
  .room-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    padding-bottom: var(--spacer-700);
    font: var(--type-label-small);
    color: var(--color-black-base);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="viewport">
  <div class="dynamic-left-panel" id="dynamicLeftPanel"></div>
  <div class="panel-handle" id="panelHandle"></div>
  <div class="scene-container" id="sceneContainer">
    <canvas id="canvas"></canvas>
    <div class="room-label" id="roomLabel"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="CameraController.js"></script>
<script src="PanelController.js"></script>
<script src="SceneController.js"></script>
<script src="RoomConfig.js"></script>
<script src="FurnitureConfig.js"></script>
<script src="SceneData.js"></script>
<script src="EdgeAffinity.js"></script>
<script src="StateController.js"></script>
<script src="PulseController.js"></script>
<script src="CursorController.js"></script>
<script src="PlacingMenu.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════════════════
const ROOM = ROOMS.rectangleDefault;
document.getElementById('roomLabel').textContent = ROOM.label;

// ══════════════════════════════════════════════════════════════
//  THREE.JS SETUP
// ══════════════════════════════════════════════════════════════
const canvas    = document.getElementById('canvas');
const container = document.getElementById('sceneContainer');

const scene = new THREE.Scene();
scene.background = null;

const frustumSize = Math.max(ROOM.width, ROOM.height) + 6;
const aspect = container.clientWidth / container.clientHeight;

const camera = new THREE.OrthographicCamera(
  -frustumSize * aspect / 2,  frustumSize * aspect / 2,
   frustumSize / 2,           -frustumSize / 2,
   0.1, 100
);
camera.position.y = 20;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ══════════════════════════════════════════════════════════════
//  CONTROLLERS
// ══════════════════════════════════════════════════════════════
const cam = new CameraController(camera, container, {
  zoom: 1.1,
  x: ROOM.width / 2,
  z: ROOM.height / 2,
});
cam.toDefault();

const sceneCtrl = new SceneController(scene, ROOM, { showGrid: false });
const edges = new EdgeAffinity(ROOM);

const panels = new PanelController({
  panel:   document.getElementById('dynamicLeftPanel'),
  handle:  document.getElementById('panelHandle'),
  onChange: () => resize(),
});

const pulse  = new PulseController(scene, ROOM);
const cursor = new CursorController(scene, ROOM, canvas, camera, pulse);
const state  = new StateController();
const sceneData = new SceneData();
sceneCtrl.bindData(sceneData);
const placingMenu = new PlacingMenu(container, state, camera, canvas, pulse, edges, sceneData, ROOM);

// ── State wiring ─────────────────────────────────────────────
state.on('enter:placing', (data) => {
  cursor.disable();
  pulse.startAnchored(data.x, data.z);
});

state.on('enter:selected', (data) => {
  cursor.disable();
  pulse.stop();
});

state.on('enter:default', () => {
  cursor.enable();
  pulse.resetConfig();
});

canvas.addEventListener('click', (e) => {
  if (state.is(STATES.DEFAULT)) {
    const rect = canvas.getBoundingClientRect();
    const mx = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const my = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(new THREE.Vector2(mx, my), camera);
    const hit = new THREE.Vector3();
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    if (raycaster.ray.intersectPlane(plane, hit)) {
      if (hit.x >= 0 && hit.x <= ROOM.width && hit.z >= 0 && hit.z <= ROOM.height) {
        const ux = Math.floor(hit.x) + 0.5;
        const uz = Math.floor(hit.z) + 0.5;
        state.set(STATES.PLACING, { x: ux, z: uz });
      }
    }
  } else if (state.is(STATES.PLACING)) {
    state.set(STATES.DEFAULT);
  } else if (state.is(STATES.SELECTED)) {
    state.set(STATES.DEFAULT);
  }
});

// ══════════════════════════════════════════════════════════════
//  RENDER + RESIZE
// ══════════════════════════════════════════════════════════════
function resize() {
  cam.resize(frustumSize);
  renderer.setSize(container.clientWidth, container.clientHeight);
}

window.addEventListener('resize', resize);

(function animate() {
  requestAnimationFrame(animate);
  pulse.update();
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
