/* ─── Rounded box ────────────────────────────────────── */

function roundedBox(w, h, d, r) {
  r = r || 0.05;
  var shape = new THREE.Shape();
  var hw = w / 2 - r;
  var hh = h / 2 - r;
  shape.moveTo(-hw, -h / 2);
  shape.lineTo(hw, -h / 2);
  shape.quadraticCurveTo(w / 2, -h / 2, w / 2, -hh);
  shape.lineTo(w / 2, hh);
  shape.quadraticCurveTo(w / 2, h / 2, hw, h / 2);
  shape.lineTo(-hw, h / 2);
  shape.quadraticCurveTo(-w / 2, h / 2, -w / 2, hh);
  shape.lineTo(-w / 2, -hh);
  shape.quadraticCurveTo(-w / 2, -h / 2, -hw, -h / 2);

  var geo = new THREE.ExtrudeGeometry(shape, {
    depth: d,
    bevelEnabled: true,
    bevelThickness: r,
    bevelSize: r,
    bevelSegments: 10,
    curveSegments: 16,
  });
  geo.center();
  geo.computeVertexNormals();
  return geo;
}

var legGeo = new THREE.CylinderGeometry(0.022, 0.022, 0.16, 10);

/* ─── Helper ─────────────────────────────────────────── */

function add(group, geo, mat, x, y, z, rx) {

  m.position.set(x, y, z);
  if (rx) m.rotation.x = rx;
  m.castShadow = true;
  m.receiveShadow = true;
  group.add(m);
  return m;
}

(function buildVoxelHull() {

  var PAD = 0.15; // padding around bounds

    minZ = Math.min(minZ, b[2] - b[5]);
    maxX = Math.max(maxX, b[0] + b[3]);
    maxY = Math.max(maxY, b[1] + b[4]);
    maxZ = Math.max(maxZ, b[2] + b[5]);

  minX -= PAD; minY -= PAD; minZ -= PAD;
  maxX += PAD; maxY += PAD; maxZ += PAD;

  var sizeX = maxX - minX;
  var sizeY = maxY - minY;

        if (v4 < 0) cubeIndex |= 16;
        if (v5 < 0) cubeIndex |= 32;
        if (v6 < 0) cubeIndex |= 64;
        if (v7 < 0) cubeIndex |= 128;

        if (edgeTable[cubeIndex] === 0) continue;

        // Corner positions
        var cx = minX + ix / NX * sizeX;
        var cy = minY + iy / NY * sizeY;
        var cz = minZ + iz / NZ * sizeZ;
        var dx = sizeX / NX;
        var dy = sizeY / NY;
        var dz = sizeZ / NZ;

        var corners = [
          [cx, cy, cz], [cx+dx, cy, cz], [cx+dx, cy+dy, cz], [cx, cy+dy, cz],
          [cx, cy, cz+dz], [cx+dx, cy, cz+dz], [cx+dx, cy+dy, cz+dz], [cx, cy+dy, cz+dz]
        ];

        var vertList = new Array(12);

          if (edgeTable[cubeIndex] & (1 << e)) {
            var a = edgePairs[e][0], b = edgePairs[e][1];
            var t = vals[a] / (vals[a] - vals[b]);
            vertList[e] = [
              corners[a][0] + t * (corners[b][0] - corners[a][0]),
              corners[a][1] + t * (corners[b][1] - corners[a][1]),
              corners[a][2] + t * (corners[b][2] - corners[a][2]),
            ];
          }
        }

        var tris = triTable[cubeIndex];
        for (var ti = 0; tris[ti] !== -1; ti += 3) {

            vertList[tris[ti]][0], vertList[tris[ti]][1], vertList[tris[ti]][2],
            vertList[tris[ti+1]][0], vertList[tris[ti+1]][1], vertList[tris[ti+1]][2],
            vertList[tris[ti+2]][0], vertList[tris[ti+2]][1], vertList[tris[ti+2]][2]
          );
        }
      }
    }

  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.computeVertexNormals();

  var mesh = new THREE.Mesh(geo, v1Mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

// Shared voxel hull builder
function buildHull(boxes, material, group) {
  var RES = 80, PAD = 0.15, ROUND = 0.04;
  var mnX=Infinity,mnY=Infinity,mnZ=Infinity,mxX=-Infinity,mxY=-Infinity,mxZ=-Infinity;
  boxes.forEach(function(b){
    mnX=Math.min(mnX,b[0]-b[3]);mnY=Math.min(mnY,b[1]-b[4]);mnZ=Math.min(mnZ,b[2]-b[5]);
    mxX=Math.max(mxX,b[0]+b[3]);mxY=Math.max(mxY,b[1]+b[4]);mxZ=Math.max(mxZ,b[2]+b[5]);
  });
  mnX-=PAD;mnY-=PAD;mnZ-=PAD;mxX+=PAD;mxY+=PAD;mxZ+=PAD;
  var sx=mxX-mnX,sy=mxY-mnY,sz=mxZ-mnZ;
  var NX=RES,NY=Math.ceil(RES*sy/sx),NZ=Math.ceil(RES*sz/sx);
  var field=new Float32Array((NX+1)*(NY+1)*(NZ+1));
  function idx(ix,iy,iz){return ix+(NX+1)*(iy+(NY+1)*iz);}
  for(var iz=0;iz<=NZ;iz++)for(var iy=0;iy<=NY;iy++)for(var ix=0;ix<=NX;ix++){
    var px=mnX+(ix/NX)*sx,py=mnY+(iy/NY)*sy,pz=mnZ+(iz/NZ)*sz;
    var md=Infinity;
    for(var bi=0;bi<boxes.length;bi++){var b=boxes[bi];
      var dx=Math.max(Math.abs(px-b[0])-b[3]+ROUND,0);
      var dy=Math.max(Math.abs(py-b[1])-b[4]+ROUND,0);
      var dz=Math.max(Math.abs(pz-b[2])-b[5]+ROUND,0);
      var outside=Math.sqrt(dx*dx+dy*dy+dz*dz)-ROUND;
      var inside=Math.min(Math.max(Math.abs(px-b[0])-b[3]+ROUND,Math.abs(py-b[1])-b[4]+ROUND,Math.abs(pz-b[2])-b[5]+ROUND),0);
      md=Math.min(md,outside+inside);
    }
    field[idx(ix,iy,iz)]=md;
  }
  var positions=[];
  for(var iz=0;iz<NZ;iz++)for(var iy=0;iy<NY;iy++)for(var ix=0;ix<NX;ix++){
    var v0=field[idx(ix,iy,iz)],v1=field[idx(ix+1,iy,iz)];
    var v2=field[idx(ix+1,iy+1,iz)],v3=field[idx(ix,iy+1,iz)];
    var v4=field[idx(ix,iy,iz+1)],v5f=field[idx(ix+1,iy,iz+1)];
    var v6=field[idx(ix+1,iy+1,iz+1)],v7=field[idx(ix,iy+1,iz+1)];
    var ci=0;
    if(v0<0)ci|=1;if(v1<0)ci|=2;if(v2<0)ci|=4;if(v3<0)ci|=8;
    if(v4<0)ci|=16;if(v5f<0)ci|=32;if(v6<0)ci|=64;if(v7<0)ci|=128;
    if(edgeTable[ci]===0)continue;
    var cx=mnX+ix/NX*sx,cy=mnY+iy/NY*sy,cz=mnZ+iz/NZ*sz;
    var ddx=sx/NX,ddy=sy/NY,ddz=sz/NZ;
    var corners=[[cx,cy,cz],[cx+ddx,cy,cz],[cx+ddx,cy+ddy,cz],[cx,cy+ddy,cz],[cx,cy,cz+ddz],[cx+ddx,cy,cz+ddz],[cx+ddx,cy+ddy,cz+ddz],[cx,cy+ddy,cz+ddz]];
    var vals=[v0,v1,v2,v3,v4,v5f,v6,v7];
    var edgePairs=[[0,1],[1,2],[2,3],[3,0],[4,5],[5,6],[6,7],[7,4],[0,4],[1,5],[2,6],[3,7]];
    var vertList=new Array(12);
    for(var e=0;e<12;e++){if(edgeTable[ci]&(1<<e)){var a=edgePairs[e][0],b=edgePairs[e][1];var t=vals[a]/(vals[a]-vals[b]);vertList[e]=[corners[a][0]+t*(corners[b][0]-corners[a][0]),corners[a][1]+t*(corners[b][1]-corners[a][1]),corners[a][2]+t*(corners[b][2]-corners[a][2])];}}
    var tris=triTable[ci];
    for(var ti=0;tris[ti]!==-1;ti+=3){positions.push(vertList[tris[ti]][0],vertList[tris[ti]][1],vertList[tris[ti]][2],vertList[tris[ti+1]][0],vertList[tris[ti+1]][1],vertList[tris[ti+1]][2],vertList[tris[ti+2]][0],vertList[tris[ti+2]][1],vertList[tris[ti+2]][2]);}
  }
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(positions,3));
  geo.computeVertexNormals();
  var mesh=new THREE.Mesh(geo,material);
  mesh.castShadow=true;mesh.receiveShadow=true;
  group.add(mesh);
}

/* ─── Orbit + Zoom ───────────────────────────────────── */

var isDragging = false, prevX = 0, prevY = 0;
var targetAx = Math.PI / 4.5, targetAy = 0.35;
var ax = targetAx, ay = targetAy;
var R = 4.4;
var targetR = R;
var R_MIN = 2.5, R_MAX = 7.0;

canvas.addEventListener('pointerdown', function(e) {
  isDragging = true; prevX = e.clientX; prevY = e.clientY;
});
window.addEventListener('pointerup', function() { isDragging = false; });
canvas.addEventListener('pointermove', function(e) {
  if (!isDragging) return;
  targetAx -= (e.clientX - prevX) * 0.006;
  targetAy = Math.max(0.08, Math.min(1.2, targetAy + (e.clientY - prevY) * 0.005));
  prevX = e.clientX; prevY = e.clientY;
});

canvas.addEventListener('wheel', function(e) {
  e.preventDefault();
  targetR = Math.max(R_MIN, Math.min(R_MAX, targetR + e.deltaY * 0.003));
}, { passive: false });

canvas.addEventListener('touchstart', function(e) {
  if (e.touches.length === 1) {
    isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  }
  if (e.touches.length === 2) {
    isDragging = false;
    pinchStart = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
window.addEventListener('touchend', function() { isDragging = false; });

var pinchStart = 0;
canvas.addEventListener('touchmove', function(e) {
  if (e.touches.length === 1 && isDragging) {
    targetAx -= (e.touches[0].clientX - prevX) * 0.006;
    targetAy = Math.max(0.08, Math.min(1.2, targetAy + (e.touches[0].clientY - prevY) * 0.005));
    prevX = e.touches[0].clientX; prevY = e.touches[0].clientY;
  }
  if (e.touches.length === 2) {
    var dist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    targetR = Math.max(R_MIN, Math.min(R_MAX, targetR - (dist - pinchStart) * 0.008));
    pinchStart = dist;
  }
}, { passive: true });

/* ─── Loop ───────────────────────────────────────────── */

function loop() {
  requestAnimationFrame(loop);
  ax += (targetAx - ax) * 0.08;
  ay += (targetAy - ay) * 0.08;
  R += (targetR - R) * 0.08;
  camera.position.set(
    Math.sin(ax) * Math.cos(ay) * R,
    0.3 + Math.sin(ay) * R,
    Math.cos(ax) * Math.cos(ay) * R
  );
  camera.lookAt(0, 0.3, 0);
  renderer.render(scene, camera);
}
loop();

/* ─── Resize ─────────────────────────────────────────── */

function onResize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
